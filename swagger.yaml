openapi: 3.0.0
info:
  title: Bookstore API
  description: REST API for a bookstore with auth, books, cart, orders, payments, and admin analytics.
  version: 1.0.0

servers:
  - url: http://localhost:3000/api
    description: Local development server

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # ── Auth ──────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [fullName, email, password]
      properties:
        fullName:
          type: string
          example: John Doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: secret123

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          format: password
          example: secret123

    AuthResponse:
      type: object
      properties:
        message:
          type: string
        data:
          type: object
          properties:
            id:
              type: string
            email:
              type: string
            fullName:
              type: string
        token:
          type: string

    # ── User ──────────────────────────────────────────────
    User:
      type: object
      properties:
        _id:
          type: string
        fullName:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]

    UpdateMeRequest:
      type: object
      properties:
        fullName:
          type: string

    UpdateUserByIdRequest:
      type: object
      properties:
        fullName:
          type: string
        role:
          type: string
          enum: [user, admin]

    # ── Book ──────────────────────────────────────────────
    Book:
      type: object
      properties:
        _id:
          type: string
        title:
          type: string
        description:
          type: string
        image:
          type: string
        author:
          type: string
        price:
          type: number
        oldPrice:
          type: number

    BookRequest:
      type: object
      required: [title, author, price]
      properties:
        title:
          type: string
          example: Clean Code
        description:
          type: string
        image:
          type: string
        author:
          type: string
          example: Robert C. Martin
        price:
          type: number
          example: 29.99
        oldPrice:
          type: number
          example: 39.99

    # ── Cart ──────────────────────────────────────────────
    CartItem:
      type: object
      properties:
        book:
          type: string
          description: Book ID
        quantity:
          type: integer
        price:
          type: number

    Cart:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/CartItem'

    CartResponse:
      type: object
      properties:
        message:
          type: string
        data:
          $ref: '#/components/schemas/Cart'
        total:
          type: number

    AddToCartRequest:
      type: object
      required: [bookId]
      properties:
        bookId:
          type: string
          example: 64a1f2b3c4e5d6a7b8c9d0e1
        quantity:
          type: integer
          default: 1
          example: 2

    UpdateCartRequest:
      type: object
      required: [bookId, quantity]
      properties:
        bookId:
          type: string
        quantity:
          type: integer
          description: Set to 0 or less to remove the item

    RemoveFromCartRequest:
      type: object
      required: [bookId]
      properties:
        bookId:
          type: string

    # ── Order ─────────────────────────────────────────────
    OrderItem:
      type: object
      properties:
        book:
          type: string
        quantity:
          type: integer
        price:
          type: number

    Order:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OrderItem'
        total:
          type: number
        paymentStatus:
          type: string
          enum: [pending, paid]
        orderStatus:
          type: string
          enum: [pending, confirmed, delivered, cancelled]

    UpdateOrderStatusRequest:
      type: object
      required: [orderStatus]
      properties:
        orderStatus:
          type: string
          enum: [pending, confirmed, delivered, cancelled]

    # ── Payment ───────────────────────────────────────────
    Payment:
      type: object
      properties:
        _id:
          type: string
        user:
          type: string
        order:
          type: string
        amount:
          type: number
          description: Amount in kobo
        status:
          type: string
          enum: [pending, successful, failed]
        transactionRef:
          type: string
        paymentMethod:
          type: string
        paidAt:
          type: string
          format: date-time

    InitializePaymentRequest:
      type: object
      required: [orderId]
      properties:
        orderId:
          type: string

    # ── Analytics ─────────────────────────────────────────
    DashboardStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalOrders:
          type: integer
        completedOrders:
          type: integer
        pendingOrders:
          type: integer
        completedPayments:
          type: integer
        totalRevenue:
          type: number

    # ── Shared ────────────────────────────────────────────
    MessageResponse:
      type: object
      properties:
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        message:
          type: string

# ── Global security default (override per-route where not needed) ──
security:
  - BearerAuth: []

paths:

  # ════════════════════════════════════════════
  # AUTH
  # ════════════════════════════════════════════
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out (invalidates client-side token)
      responses:
        '200':
          description: Logged out successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized

  # ════════════════════════════════════════════
  # USERS
  # ════════════════════════════════════════════
  /users/me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    put:
      tags: [Users]
      summary: Update current user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateMeRequest'
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '500':
          description: Internal server error

    delete:
      tags: [Users]
      summary: Delete own account
      responses:
        '200':
          description: Account deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized
        '404':
          description: User not found

  /users:
    get:
      tags: [Users]
      summary: Get all users (admin only)
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: User not found

    put:
      tags: [Users]
      summary: Update user by ID (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserByIdRequest'
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid role or trying to update own role
        '404':
          description: User not found

    delete:
      tags: [Users]
      summary: Delete user by ID (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '400':
          description: Cannot delete own account
        '404':
          description: User not found

  # ════════════════════════════════════════════
  # BOOKS
  # ════════════════════════════════════════════
  /books:
    get:
      tags: [Books]
      summary: Get all books
      security: []
      responses:
        '200':
          description: List of books
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Book'
        '500':
          description: Internal server error

    post:
      tags: [Books]
      summary: Create a new book (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookRequest'
      responses:
        '201':
          description: Book created
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Book'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /books/{id}:
    get:
      tags: [Books]
      summary: Get a book by ID
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Book found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Book'
        '404':
          description: Book not found

    patch:
      tags: [Books]
      summary: Update a book (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BookRequest'
      responses:
        '200':
          description: Book updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Book'
        '400':
          description: No data provided
        '404':
          description: Book not found

    delete:
      tags: [Books]
      summary: Delete a book (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Book deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Book'
        '404':
          description: Book not found

  # ════════════════════════════════════════════
  # CART
  # ════════════════════════════════════════════
  /cart:
    get:
      tags: [Cart]
      summary: Get the current user's cart
      responses:
        '200':
          description: Cart fetched
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '404':
          description: Cart not found
        '401':
          description: Unauthorized

    post:
      tags: [Cart]
      summary: Add a book to the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddToCartRequest'
      responses:
        '200':
          description: Book added to cart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Book not found
        '401':
          description: Unauthorized

    patch:
      tags: [Cart]
      summary: Update item quantity in cart (quantity ≤ 0 removes the item)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCartRequest'
      responses:
        '200':
          description: Cart updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '404':
          description: Cart or item not found
        '401':
          description: Unauthorized

    delete:
      tags: [Cart]
      summary: Clear the entire cart
      responses:
        '200':
          description: Cart cleared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageResponse'
        '401':
          description: Unauthorized

  /cart/item:
    delete:
      tags: [Cart]
      summary: Remove a single item from the cart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RemoveFromCartRequest'
      responses:
        '200':
          description: Item removed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CartResponse'
        '400':
          description: Cart does not exist
        '401':
          description: Unauthorized

  # ════════════════════════════════════════════
  # ORDERS
  # ════════════════════════════════════════════
  /orders:
    post:
      tags: [Orders]
      summary: Place an order from the current cart
      responses:
        '201':
          description: Order placed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Order'
        '400':
          description: Cart is empty
        '401':
          description: Unauthorized

    get:
      tags: [Orders]
      summary: Get all orders for the current user
      responses:
        '200':
          description: Orders fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
        '404':
          description: No orders found
        '401':
          description: Unauthorized

  /orders/{id}:
    get:
      tags: [Orders]
      summary: Get a single order by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Order'
        '404':
          description: Order not found
        '401':
          description: Unauthorized

    delete:
      tags: [Orders]
      summary: Cancel an order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Order'
        '400':
          description: Order cannot be cancelled (wrong status or already paid)
        '404':
          description: Order not found
        '401':
          description: Unauthorized

  /orders/admin/orders:
    get:
      tags: [Orders]
      summary: Get all orders (admin only)
      responses:
        '200':
          description: All orders fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Order'
        '404':
          description: No orders found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  /orders/admin/orders/{id}:
    patch:
      tags: [Orders]
      summary: Update order status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOrderStatusRequest'
      responses:
        '200':
          description: Order status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Order'
        '400':
          description: Invalid order status
        '404':
          description: Order not found
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  # ════════════════════════════════════════════
  # PAYMENT
  # ════════════════════════════════════════════
  /payment/initialize:
    post:
      tags: [Payment]
      summary: Initialize a Paystack payment for an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InitializePaymentRequest'
      responses:
        '200':
          description: Payment initialized
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  authorization_url:
                    type: string
                    description: Paystack redirect URL
                  reference:
                    type: string
        '400':
          description: Order already paid or cancelled
        '404':
          description: Order not found
        '401':
          description: Unauthorized

  /payment/verify/{reference}:
    get:
      tags: [Payment]
      summary: Verify a Paystack payment by reference
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment verified
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Payment'
        '400':
          description: Already paid or verification failed
        '404':
          description: Payment record not found
        '401':
          description: Unauthorized

  /payment:
    get:
      tags: [Payment]
      summary: Get payment history for current user
      responses:
        '200':
          description: Payments fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
        '401':
          description: Unauthorized

  /payment/{reference}:
    get:
      tags: [Payment]
      summary: Get a payment by transaction reference
      parameters:
        - name: reference
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Payment found
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/Payment'
        '404':
          description: Payment not found
        '401':
          description: Unauthorized

  /payment/webhook:
    post:
      tags: [Payment]
      summary: Paystack webhook endpoint (no auth required)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: Raw Paystack webhook event payload
      responses:
        '200':
          description: Webhook processed
        '401':
          description: Invalid Paystack signature

  /payment/admin/all:
    get:
      tags: [Payment]
      summary: Get all payments (admin only)
      responses:
        '200':
          description: All payments fetched
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Payment'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden

  # ════════════════════════════════════════════
  # ANALYTICS
  # ════════════════════════════════════════════
  /analytics:
    get:
      tags: [Analytics]
      summary: Get admin dashboard stats (admin only)
      responses:
        '200':
          description: Dashboard stats
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/DashboardStats'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal server error